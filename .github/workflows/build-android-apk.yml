name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"



      - name: Expo Prebuild
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID }}
          EXPO_PUBLIC_WC_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_WC_PROJECT_ID }}
          EXPO_PUBLIC_ENVIRONMENT: ${{ secrets.EXPO_PUBLIC_ENVIRONMENT }}
          EXPO_PUBLIC_HL_API_URL: ${{ secrets.EXPO_PUBLIC_HL_API_URL }}
          EXPO_PUBLIC_HL_WS_URL: ${{ secrets.EXPO_PUBLIC_HL_WS_URL }}
          EXPO_PUBLIC_LIGHTER_API_URL: ${{ secrets.EXPO_PUBLIC_LIGHTER_API_URL }}
          EXPO_PUBLIC_LIGHTER_WS_URL: ${{ secrets.EXPO_PUBLIC_LIGHTER_WS_URL }}
          EXPO_PUBLIC_ASTER_API_URL: ${{ secrets.EXPO_PUBLIC_ASTER_API_URL }}
          EXPO_PUBLIC_ASTER_WS_URL: ${{ secrets.EXPO_PUBLIC_ASTER_WS_URL }}
          EXPO_PUBLIC_DEFAULT_PROTOCOL: ${{ secrets.EXPO_PUBLIC_DEFAULT_PROTOCOL }}

      - name: Setup release keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: wrapper
          cache-read-only: false

      - name: Make Gradlew Executable
        run: chmod +x android/gradlew

      - name: Build APK
        working-directory: android
        run: |
          ./gradlew assembleRelease \
            --build-cache \
            --parallel \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            -PMYAPP_RELEASE_STORE_FILE=release.keystore \
            -PMYAPP_RELEASE_STORE_PASSWORD=${{ secrets.RELEASE_KEYSTORE_PASSWORD }} \
            -PMYAPP_RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }} \
            -PMYAPP_RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/*.apk
